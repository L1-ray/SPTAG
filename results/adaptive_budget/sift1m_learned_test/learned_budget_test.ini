[Base]
IndexDirectory=sift1m_index
VectorPath=data/sift/sift_base.fvecs
TruthPath=data/sift/sift_groundtruth.ivecs
QueryPath=data/sift/sift_query.fvecs

[SearchSSDIndex]
; Enable learned budget policy
EnableLearnedBudget=true
LearnedBudgetModelPath=results/adaptive_budget/phase4_learned
LearnedBudgetThreshold=0.97
LearnedBudgetDefault=64
LearnedBudgetMin=32

; Search parameters
SearchThreadNum=4
ResultNum=10
MaxCheck=4096
IOThreadsPerHandler=4
SearchInternalResultNum=64

; Stats collection
EnableDetailedIOStats=true
DetailedIOStatsOutput=results/adaptive_budget/sift1m_learned_test/io_stats.csv

; Trace for analysis
EnableHeadDistanceTrace=true
HeadDistanceTraceOutput=results/adaptive_budget/sift1m_learned_test/head_distance_trace.csv
